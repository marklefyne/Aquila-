<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Cyber Monitor | חמ"ל סריקה</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
    <nav class="border-b border-cyan-900 p-4 bg-black/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold tracking-widest text-cyan-500">ISRAEL<span class="text-white font-light">SCAN</span></div>
            <div class="status-indicator flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs uppercase">System Live</span>
            </div>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">לוח בקרה לניטור חולשות</h1>
            <p class="text-gray-500 italic">סריקה אקטיבית של תשתיות IoT בישראל</p>
        </header>

        <div class="mb-6 relative">
            <input type="text" id="searchInput" placeholder="חפש לפי IP, עיר או סוג מכשיר..." 
                   class="w-full bg-gray-900 border border-cyan-900 rounded-lg py-3 px-12 focus:ring-2 focus:ring-cyan-500 outline-none transition">
            <span class="absolute right-4 top-3.5 opacity-50">🔍</span>
        </div>

        <div class="bg-gray-900/40 border border-gray-800 rounded-xl overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-gray-800/50 text-cyan-500 text-sm uppercase">
                        <th class="p-4 border-b border-gray-800">Target IP</th>
                        <th class="p-4 border-b border-gray-800">Manufacturer</th>
                        <th class="p-4 border-b border-gray-800">Status</th>
                        <th class="p-4 border-b border-gray-800">Action</th>
                    </tr>
                </thead>
                <tbody id="targetTable">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
